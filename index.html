<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Research Portfolio</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --dl-color: #FF6F61;
    --nlp-color: #4A90D9;
    --tx-color: #9B59B6;
    --ts-color: #2ECC71;
    --ml-color: #F39C12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: 2.6rem;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #58a6ff, #9B59B6, #FF6F61);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 640px;
    margin: 0 auto 28px;
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Container ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Search & Filter Bar ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    margin-bottom: 32px;
  }
  .controls-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus {
    border-color: var(--accent);
  }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .filter-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.2s;
    user-select: none;
  }
  .chip:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .chip.active {
    color: #fff;
    border-color: transparent;
  }
  .chip[data-topic="all"].active { background: var(--accent); }
  .chip[data-topic="deep-learning"].active { background: var(--dl-color); }
  .chip[data-topic="nlp-llms"].active { background: var(--nlp-color); }
  .chip[data-topic="transformers"].active { background: var(--tx-color); }
  .chip[data-topic="time-series"].active { background: var(--ts-color); }
  .chip[data-topic="machine-learning"].active { background: var(--ml-color); }

  /* ── Topic Section Headers ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 48px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header.hidden { display: none; }
  .section-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-header h2 {
    font-size: 1.35rem;
    font-weight: 600;
  }
  .section-count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* ── Paper Cards ── */
  .papers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .paper-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .paper-card:hover {
    border-color: #484f58;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .paper-card:hover::before { opacity: 1; }
  .paper-card[data-topic="deep-learning"]::before { background: var(--dl-color); }
  .paper-card[data-topic="nlp-llms"]::before { background: var(--nlp-color); }
  .paper-card[data-topic="transformers"]::before { background: var(--tx-color); }
  .paper-card[data-topic="time-series"]::before { background: var(--ts-color); }
  .paper-card[data-topic="machine-learning"]::before { background: var(--ml-color); }

  .paper-card.hidden {
    display: none;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .card-year {
    font-size: 0.78rem;
    color: var(--text-muted);
    background: rgba(88,166,255,0.1);
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .card-venue {
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .card-authors {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .card-takeaway {
    font-size: 0.88rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.5;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .tag-task { background: rgba(88,166,255,0.15); color: #79c0ff; }
  .tag-arch { background: rgba(155,89,182,0.15); color: #c49bde; }
  .tag-domain { background: rgba(46,204,113,0.15); color: #7ee2a8; }
  .tag-method { background: rgba(243,156,18,0.15); color: #f5c563; }
  .tag-scale { background: rgba(255,111,97,0.15); color: #ffa198; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card-links a {
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
    margin-right: 12px;
    transition: opacity 0.2s;
  }
  .card-links a:hover { opacity: 0.8; }
  .code-status {
    font-size: 0.75rem;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .code-status.not-started { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .code-status.in-progress { background: rgba(243,156,18,0.15); color: #f5c563; }
  .code-status.complete { background: rgba(46,204,113,0.15); color: #7ee2a8; }

  /* ── Expanded Card / Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 780px;
    width: 100%;
    padding: 36px;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-section {
    margin-top: 24px;
  }
  .modal-section h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-section p, .modal-section li {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .modal-section ul {
    padding-left: 20px;
  }

  .modal-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 0.85rem;
  }
  .modal-table th {
    text-align: left;
    padding: 8px 12px;
    background: rgba(88,166,255,0.06);
    color: var(--text);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .modal-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }

  .equation-block {
    background: rgba(88,166,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 10px 0;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    color: var(--text);
    text-align: center;
    overflow-x: auto;
  }

  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 0.82rem;
  }
  .comparison-table th {
    background: rgba(155,89,182,0.1);
    padding: 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .comparison-table td {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }

  .folder-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    padding: 10px 20px;
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 8px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .folder-link:hover {
    background: rgba(88,166,255,0.18);
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    margin-top: 64px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .hero h1 { font-size: 1.8rem; }
    .papers-grid { grid-template-columns: 1fr; }
    .stats { gap: 20px; }
    .controls-inner { flex-direction: column; }
    .modal-content { padding: 24px; }
  }
</style>
</head>
<body>

<!-- ═══ Hero ═══ -->
<header class="hero">
  <h1>ML Research Portfolio</h1>
  <p>A curated collection of research papers, implementations, and applied insights across Machine Learning, Deep Learning, and AI.</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="paperCount">9</div>
      <div class="stat-label">Papers Studied</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="topicCount">5</div>
      <div class="stat-label">Topics</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="implCount">0</div>
      <div class="stat-label">Implementations</div>
    </div>
  </div>
</header>

<!-- ═══ Search & Filter ═══ -->
<div class="controls">
  <div class="controls-inner">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search papers, authors, tags..." autocomplete="off">
    </div>
    <div class="filter-chips">
      <span class="chip active" data-topic="all" onclick="filterTopic('all', this)">All</span>
      <span class="chip" data-topic="deep-learning" onclick="filterTopic('deep-learning', this)">Deep Learning</span>
      <span class="chip" data-topic="nlp-llms" onclick="filterTopic('nlp-llms', this)">NLP / LLMs</span>
      <span class="chip" data-topic="transformers" onclick="filterTopic('transformers', this)">Transformers</span>
      <span class="chip" data-topic="time-series" onclick="filterTopic('time-series', this)">Time Series</span>
      <span class="chip" data-topic="machine-learning" onclick="filterTopic('machine-learning', this)">Machine Learning</span>
    </div>
  </div>
</div>

<!-- ═══ Main Content ═══ -->
<div class="container" id="mainContent">
</div>

<!-- ═══ Modal ═══ -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content" id="modalBody">
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
</div>

<!-- ═══ Footer ═══ -->
<footer>
  Built with curiosity and rigor.
</footer>

<script>
// ─────────────────────────────────────────────
// Paper Data
// ─────────────────────────────────────────────
const papers = [
  {
    id: 'resnet',
    title: 'Deep Residual Learning for Image Recognition',
    shortTitle: 'ResNet',
    authors: 'Kaiming He, Xiangyu Zhang, Shaoqing Ren, Jian Sun',
    year: 2016,
    venue: 'CVPR',
    topic: 'deep-learning',
    topicLabel: 'Deep Learning',
    folder: 'papers/deep-learning/resnet',
    arxiv: 'https://arxiv.org/abs/1512.03385',
    takeaway: 'Skip connections let you train networks 10\u2013100\u00d7 deeper by learning residual mappings instead of direct mappings, solving the degradation problem.',
    tags: [
      { label: 'Image Classification', type: 'task' },
      { label: 'CNN', type: 'arch' },
      { label: 'Computer Vision', type: 'domain' },
      { label: 'Supervised', type: 'method' },
      { label: 'Large-Scale', type: 'scale' }
    ],
    codeStatus: 'not-started',
    summary: 'This paper addresses a fundamental problem: deeper neural networks were performing worse than shallower ones, not because of overfitting, but due to optimization difficulty (the degradation problem). The authors introduce residual learning \u2014 instead of learning a mapping H(x) directly, the network learns the residual F(x) = H(x) \u2212 x through shortcut connections. This enabled training of networks up to 152 layers deep, winning ILSVRC 2015 with 3.57% top-5 error.',
    methodology: 'The core building block is the residual block: input x passes through a main path with stacked conv layers computing F(x), and a shortcut connection carrying x directly. Outputs are summed: y = F(x) + x. For deeper models (ResNet-50+), bottleneck blocks use 1\u00d71 convolutions to reduce and restore dimensionality.',
    equation: 'y = F(x, {W\u1d62}) + x',
    training: [
      ['Loss', 'Cross-entropy'],
      ['Optimizer', 'SGD + momentum (0.9)'],
      ['LR', '0.1, /10 on plateau'],
      ['Batch size', '256'],
      ['Hardware', 'Multi-GPU']
    ],
    innovation: 'Rather than hoping layers learn the desired mapping directly, ResNet explicitly formulates layers as learning residual functions. If the optimal mapping is close to identity, it\u2019s much easier to push the residual to zero. This made very deep networks trainable for the first time.',
    comparison: [
      ['Max depth', '~22 layers', '152+ layers'],
      ['Degradation', 'Accuracy drops > 20 layers', 'Improves with depth'],
      ['Skip connections', 'Not used', 'Core principle'],
      ['ImageNet top-5', '~7%', '3.57%']
    ],
    applicability: 'ResNet backbones are ubiquitous: medical imaging, autonomous driving, satellite analysis, content moderation. ResNet-50 remains one of the most deployed vision models. The residual connection principle was adopted across all domains \u2014 transformers, speech, GNNs.',
    results: [
      ['ImageNet', 'Top-5 Error', '3.57%', '6.67%'],
      ['COCO Detection', 'mAP', '59.0%', '45.8%']
    ]
  },
  {
    id: 'batchnorm',
    title: 'Batch Normalization: Accelerating Deep Network Training by Reducing Internal Covariate Shift',
    shortTitle: 'Batch Normalization',
    authors: 'Sergey Ioffe, Christian Szegedy',
    year: 2015,
    venue: 'ICML',
    topic: 'deep-learning',
    topicLabel: 'Deep Learning',
    folder: 'papers/deep-learning/batch-normalization',
    arxiv: 'https://arxiv.org/abs/1502.03167',
    takeaway: 'Normalizing activations within each mini-batch stabilizes training, enables much higher learning rates, and acts as a regularizer.',
    tags: [
      { label: 'Training Optimization', type: 'task' },
      { label: 'CNN', type: 'arch' },
      { label: 'General DL', type: 'domain' },
      { label: 'Normalization', type: 'method' }
    ],
    codeStatus: 'not-started',
    summary: 'This paper identified "internal covariate shift" \u2014 shifting input distributions during training \u2014 as a major training obstacle. Batch Normalization normalizes layer inputs across the mini-batch and introduces learnable scale (\u03b3) and shift (\u03b2) parameters. Networks trained 14\u00d7 faster, tolerated higher learning rates, and reduced initialization sensitivity.',
    methodology: 'BN is inserted after each linear/convolutional transformation and before activation. For mini-batch B, it computes batch mean and variance, normalizes, then applies learned affine transformation. During inference, running averages replace batch statistics.',
    equation: '\u0177\u1d62 = (x\u1d62 \u2212 \u03bc_B) / \u221a(\u03c3\u00b2_B + \u03b5)\ny\u1d62 = \u03b3\u0177\u1d62 + \u03b2',
    training: [
      ['Loss', 'Cross-entropy'],
      ['Optimizer', 'SGD + momentum'],
      ['LR', '5\u201330\u00d7 higher than without BN'],
      ['Key result', 'Matched Inception in 14\u00d7 fewer steps'],
      ['Hardware', 'Standard GPU']
    ],
    innovation: 'Before BN, training required careful initialization, low learning rates, and dropout. BN made all of this less critical. The learnable \u03b3 and \u03b2 preserve representational capacity while providing built-in regularization.',
    comparison: [
      ['Learning rate', 'Low, carefully tuned', '5\u201330\u00d7 higher'],
      ['Initialization', 'Critical', 'Less sensitive'],
      ['Regularization', 'Dropout needed', 'Built-in'],
      ['Training speed', 'Baseline', '~14\u00d7 faster']
    ],
    applicability: 'BN is a default layer in virtually every production deep learning system \u2014 image classifiers, detectors, generative models, speech. Understanding BN is essential for debugging training instability and choosing batch sizes.',
    results: [
      ['ImageNet (Inception)', 'Top-5 Error', '4.82%', '6.67%'],
      ['Training speed', 'Convergence', '14\u00d7 fewer steps', 'Baseline']
    ]
  },
  {
    id: 'bert',
    title: 'BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding',
    shortTitle: 'BERT',
    authors: 'Jacob Devlin, Ming-Wei Chang, Kenton Lee, Kristina Toutanova',
    year: 2019,
    venue: 'NAACL',
    topic: 'nlp-llms',
    topicLabel: 'NLP / LLMs',
    folder: 'papers/nlp-llms/bert',
    arxiv: 'https://arxiv.org/abs/1810.04805',
    takeaway: 'Bidirectional pre-training with masked language modeling produces representations that transfer to virtually any NLP task, establishing the pretrain-then-finetune paradigm.',
    tags: [
      { label: 'Language Understanding', type: 'task' },
      { label: 'Transformer Encoder', type: 'arch' },
      { label: 'NLP', type: 'domain' },
      { label: 'Self-Supervised', type: 'method' },
      { label: 'Large-Scale', type: 'scale' }
    ],
    codeStatus: 'not-started',
    summary: 'BERT demonstrated that pre-training a deep bidirectional transformer on unlabeled text, then fine-tuning with a single output layer, could achieve SOTA on 11 different NLP tasks. The key innovation was truly bidirectional pre-training using Masked Language Modeling (MLM), where 15% of tokens are masked and predicted using full context.',
    methodology: 'BERT-Base: 12 layers, 768 hidden, 12 heads (110M params). BERT-Large: 24 layers, 1024 hidden, 16 heads (340M params). Input sums token, segment, and position embeddings. [CLS] token for classification, token-level for labeling.',
    equation: '\u2112_MLM = \u2212\u2211 log P(x\u1d62 | x_\\i ; \u03b8)',
    training: [
      ['Loss', 'MLM + Next Sentence Prediction'],
      ['Optimizer', 'Adam (lr=1e-4, warmup 10K steps)'],
      ['Batch size', '256 sequences'],
      ['Steps', '1M pre-training'],
      ['Data', 'BooksCorpus + Wikipedia (3.3B words)'],
      ['Hardware', '4\u201316 Cloud TPUs, 4 days']
    ],
    innovation: 'GPT used left-to-right training; ELMo concatenated independently trained bidirectional models. BERT was the first to achieve deep bidirectional pre-training via MLM, capturing much richer contextual information. This was a significant conceptual leap.',
    comparison: [
      ['Context', 'Unidirectional (GPT)', 'Deep bidirectional'],
      ['Architecture', 'Decoder (GPT) / BiLSTM (ELMo)', 'Transformer encoder'],
      ['Fine-tuning', 'Minimal / Feature-based', 'Full fine-tuning'],
      ['GLUE score', '72.8 (GPT)', '82.1 (Large)']
    ],
    applicability: 'BERT powers search engines (Google Search), sentiment analysis, chatbot intent classification, NER in healthcare and legal docs. DistilBERT and TinyBERT made it practical for edge deployment.',
    results: [
      ['GLUE', 'Average', '82.1', '72.8'],
      ['SQuAD 1.1', 'F1', '93.2', '91.6'],
      ['SQuAD 2.0', 'F1', '83.1', '66.3']
    ]
  },
  {
    id: 'gpt3',
    title: 'Language Models are Few-Shot Learners',
    shortTitle: 'GPT-3',
    authors: 'Tom Brown, Benjamin Mann, Nick Ryder, et al.',
    year: 2020,
    venue: 'NeurIPS',
    topic: 'nlp-llms',
    topicLabel: 'NLP / LLMs',
    folder: 'papers/nlp-llms/gpt3-few-shot-learners',
    arxiv: 'https://arxiv.org/abs/2005.14165',

// ─────────────────────────────────────────────
// Topic config
// ─────────────────────────────────────────────
const topicConfig = {
  'deep-learning':    { label: 'Deep Learning', icon: '\ud83d\udd25', color: '#FF6F61' },
  'nlp-llms':         { label: 'NLP / Large Language Models', icon: '\ud83d\udcac', color: '#4A90D9' },
  'transformers':     { label: 'Transformers', icon: '\u26a1', color: '#9B59B6' },
  'time-series':      { label: 'Time Series', icon: '\ud83d\udcc8', color: '#2ECC71' },
  'machine-learning': { label: 'Machine Learning', icon: '\ud83c\udfaf', color: '#F39C12' }
};

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let activeTopic = 'all';
let searchQuery = '';

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function render() {
  const container = document.getElementById('mainContent');
  const filtered = papers.filter(p => {
    const matchTopic = activeTopic === 'all' || p.topic === activeTopic;
    if (!matchTopic) return false;
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return p.title.toLowerCase().includes(q)
      || p.shortTitle.toLowerCase().includes(q)
      || p.authors.toLowerCase().includes(q)
      || p.tags.some(t => t.label.toLowerCase().includes(q))
      || p.takeaway.toLowerCase().includes(q)
      || p.topicLabel.toLowerCase().includes(q)
      || String(p.year).includes(q);
  });

  // Group by topic
  const grouped = {};
  const topicOrder = ['deep-learning','nlp-llms','transformers','time-series','machine-learning'];
  for (const t of topicOrder) grouped[t] = [];
  for (const p of filtered) grouped[p.topic].push(p);

  let html = '';
  for (const topic of topicOrder) {
    const paps = grouped[topic];
    const cfg = topicConfig[topic];
    const isHidden = paps.length === 0;

    html += `
      <div class="section-header ${isHidden ? 'hidden' : ''}" id="section-${topic}">
        <span class="section-dot" style="background:${cfg.color}"></span>
        <h2>${cfg.icon} ${cfg.label}</h2>
        <span class="section-count">${paps.length} paper${paps.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="papers-grid">
    `;

    for (const p of paps) {
      const tagHtml = p.tags.map(t =>
        `<span class="tag tag-${t.type}">${t.label}</span>`
      ).join('');

      const statusLabel = p.codeStatus === 'complete' ? 'Complete'
        : p.codeStatus === 'in-progress' ? 'In Progress' : 'Not Started';

      html += `
        <div class="paper-card" data-topic="${p.topic}" data-id="${p.id}" onclick="openModal('${p.id}')">
          <div class="card-top">
            <span class="card-venue">${p.venue}</span>
            <span class="card-year">${p.year}</span>
          </div>
          <div class="card-title">${p.shortTitle}</div>
          <div class="card-authors">${p.authors}</div>
          <div class="card-takeaway">${p.takeaway}</div>
          <div class="card-tags">${tagHtml}</div>
          <div class="card-footer">
            <div class="card-links">
              <a href="${p.arxiv}" target="_blank" onclick="event.stopPropagation()">arXiv \u2197</a>
              <a href="${p.folder}/README.md" onclick="event.stopPropagation()">Folder \u2197</a>
            </div>
            <span class="code-status ${p.codeStatus}">${statusLabel}</span>
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  if (filtered.length === 0) {
    html = `<div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
      <div style="font-size:2.5rem;margin-bottom:12px;">\ud83d\udd0d</div>
      <div style="font-size:1.1rem;">No papers match your search.</div>
      <div style="font-size:0.9rem;margin-top:6px;">Try a different keyword or clear the filter.</div>
    </div>`;
  }

  container.innerHTML = html;
}

// ─────────────────────────────────────────────
// Filter & Search
// ─────────────────────────────────────────────
function filterTopic(topic, el) {
  activeTopic = topic;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ─────────────────────────────────────────────
// Modal
// ─────────────────────────────────────────────
function openModal(id) {
  const p = papers.find(x => x.id === id);
  if (!p) return;
  const cfg = topicConfig[p.topic];

  const tagHtml = p.tags.map(t =>
    `<span class="tag tag-${t.type}">${t.label}</span>`
  ).join('');

  const trainingRows = p.training.map(([k,v]) =>
    `<tr><td><strong>${k}</strong></td><td>${v}</td></tr>`
  ).join('');

  const comparisonRows = p.comparison.map(([aspect, prior, paper]) =>
    `<tr><td>${aspect}</td><td>${prior}</td><td>${paper}</td></tr>`
  ).join('');

  const resultsRows = p.results.map(r => {
    const cells = r.map(c => `<td>${c}</td>`).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  const resultsHeader = p.results[0] && p.results[0].length === 4
    ? '<tr><th>Benchmark</th><th>Metric</th><th>This Paper</th><th>Previous SOTA</th></tr>'
    : '<tr><th>Benchmark</th><th>Metric</th><th>Result</th></tr>';

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <span class="section-dot" style="background:${cfg.color}"></span>
      <span style="font-size:0.82rem;color:var(--text-muted)">${cfg.label} \u00b7 ${p.venue} ${p.year}</span>
    </div>
    <h2 style="font-size:1.4rem;margin-bottom:4px;">${p.title}</h2>
    <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:16px;">${p.authors}</p>
    <div class="card-tags" style="margin-bottom:0;">${tagHtml}</div>

    <div class="modal-section">
      <h3>\ud83d\udcdd Summary</h3>
      <p>${p.summary}</p>
    </div>

    <div class="modal-section">
      <h3>\ud83d\udd2c Methodology</h3>
      <p>${p.methodology}</p>
      <div class="equation-block">${p.equation.replace(/\n/g, '<br>')}</div>
      <table class="modal-table">
        ${trainingRows}
      </table>
    </div>

    <div class="modal-section">
      <h3>\ud83d\udca1 Innovation</h3>
      <p>${p.innovation}</p>
      <table class="comparison-table">
        <tr><th>Aspect</th><th>Prior Work</th><th>This Paper</th></tr>
        ${comparisonRows}
      </table>
    </div>

    <div class="modal-section">
      <h3>\ud83c\udf0d Real-World Applicability</h3>
      <p>${p.applicability}</p>
    </div>

    <div class="modal-section">
      <h3>\ud83d\udcca Key Results</h3>
      <table class="modal-table">
        ${resultsHeader}
        ${resultsRows}
      </table>
    </div>

    <a class="folder-link" href="${p.folder}/README.md">\ud83d\udcc2 Open Paper Folder</a>
    <a class="folder-link" href="${p.arxiv}" target="_blank" style="margin-left:8px;">\ud83d\udcc4 arXiv</a>
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
